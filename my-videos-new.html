<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的影片</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="muji-container">
    <header class="muji-header">
      <div class="muji-header-content">
        <h1 class="muji-logo">我的影片牆</h1>
        <div class="muji-header-right">
          <span class="muji-user-email" id="userEmail"></span>
          <button id="logoutBtn" class="muji-btn muji-btn-logout">登出</button>
        </div>
      </div>
    </header>

    <nav class="muji-nav">
      <ul class="muji-nav-list">
        <li><a href="dashboard.html">我的配對</a></li>
        <li><a href="upload.html">上傳視頻</a></li>
        <li><a href="my-videos-new.html" class="active">我的影片</a></li>
      </ul>
    </nav>

    <main class="muji-main">
      <section class="muji-hero">
        <div class="muji-hero-content">
          <h2 class="muji-title">我的影片牆</h2>
          <p class="muji-subtitle">按時間軸篩選並管理已上傳的視頻</p>
        </div>
        <a href="upload.html" class="muji-btn muji-btn-primary">+ 上傳新影片</a>
      </section>

      <section class="muji-stats" id="statsBar"></section>
      <section class="muji-timeline" id="timelineFilter"></section>
      <section class="muji-wall" id="videoWall"></section>

      <div id="emptyState" class="muji-empty" style="display:none;">
        <div class="muji-empty-icon">🎬</div>
        <p>暫無影片，點擊上方"上傳新影片"開始</p>
      </div>

      <div id="errorMessage" class="muji-error"></div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/partnership.js"></script>
  <script src="js/video.js"></script>

  <script>
    let currentUser = null;
    let currentFilter = 'all';
    let userVideos = [];

    const timelineFilterEl = document.getElementById('timelineFilter');
    const statsBarEl = document.getElementById('statsBar');
    const videoWallEl = document.getElementById('videoWall');
    const emptyStateEl = document.getElementById('emptyState');
    const errorMessageEl = document.getElementById('errorMessage');

    const filters = [
      { id: 'all', label: '全部' },
      { id: 'today', label: '今天' },
      { id: 'week', label: '本週' },
      { id: 'month', label: '本月' }
    ];

    onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = user;
      document.getElementById('userEmail').textContent = user.email;
      await loadUserVideos();
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await logoutUser();
      window.location.href = 'index.html';
    });

    async function loadUserVideos() {
      try {
        errorMessageEl.textContent = '';
        const videos = await getUserVideos(currentUser.uid);
        userVideos = videos;
        renderTimelineFilters(videos);
        renderStats(videos);
        renderVideoWall();
      } catch (error) {
        errorMessageEl.textContent = '加載視頻失敗: ' + error.message;
      }
    }

    function renderTimelineFilters(videos) {
      const counts = {
        all: videos.length,
        today: videos.filter(isToday).length,
        week: videos.filter(isThisWeek).length,
        month: videos.filter(isThisMonth).length,
      };

      timelineFilterEl.innerHTML = filters.map(filter => {
        const activeClass = filter.id === currentFilter ? 'active' : '';
        return `
          <button class="muji-filter-chip ${activeClass}" data-filter="${filter.id}">
            <span class="filter-label">${filter.label}</span>
            <span class="filter-count">${counts[filter.id]}</span>
          </button>
        `;
      }).join('');

      document.querySelectorAll('.muji-filter-chip').forEach(btn => {
        btn.addEventListener('click', () => {
          currentFilter = btn.dataset.filter;
          document.querySelectorAll('.muji-filter-chip').forEach(el => el.classList.remove('active'));
          btn.classList.add('active');
          renderVideoWall();
        });
      });
    }

    function renderStats(videos) {
      const total = videos.length;
      const today = videos.filter(isToday).length;
      const week = videos.filter(isThisWeek).length;
      const month = videos.filter(isThisMonth).length;

      statsBarEl.innerHTML = `
        <div class="muji-stat-item">
          <div class="stat-number">${total}</div>
          <div class="stat-label">全部影片</div>
        </div>
        <div class="muji-stat-item">
          <div class="stat-number">${today}</div>
          <div class="stat-label">今天</div>
        </div>
        <div class="muji-stat-item">
          <div class="stat-number">${week}</div>
          <div class="stat-label">本週</div>
        </div>
        <div class="muji-stat-item">
          <div class="stat-number">${month}</div>
          <div class="stat-label">本月</div>
        </div>
      `;
    }

    function renderVideoWall() {
      const filteredVideos = filterVideos(userVideos, currentFilter);

      if (filteredVideos.length === 0) {
        videoWallEl.innerHTML = '';
        emptyStateEl.style.display = 'flex';
        return;
      }

      emptyStateEl.style.display = 'none';
      videoWallEl.innerHTML = filteredVideos.map(video => {
        const uploadedAt = formatDateTime(video.uploaded_at);
        const partnerLabel = video.partnership_id ? '已配對' : '未配對';
        const partnerAction = video.partnership_id
          ? `<a href="video-pair.html?partnerId=${video.partnership_id}" class="muji-action-link">觀看配對</a>`
          : '';

        return `
          <div class="muji-video-card">
            <div class="muji-video-preview">
              <video src="${video.cloudinary_url}" controls muted playsinline preload="metadata"></video>
            </div>
            <div class="muji-video-info">
              <div class="video-meta">
                <span class="meta-label">${partnerLabel}</span>
                <span class="meta-time">${uploadedAt}</span>
              </div>
              <div class="video-actions">
                ${partnerAction}
                <button class="muji-action-delete" onclick="deleteVideoAction('${video.id}')">刪除</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function filterVideos(videos, filter) {
      if (filter === 'all') return videos;
      if (filter === 'today') return videos.filter(isToday);
      if (filter === 'week') return videos.filter(isThisWeek);
      if (filter === 'month') return videos.filter(isThisMonth);
      return videos;
    }

    function isToday(video) {
      const date = video.uploaded_at.toDate();
      const now = new Date();
      return date.toDateString() === now.toDateString();
    }

    function isThisWeek(video) {
      const date = video.uploaded_at.toDate();
      const now = new Date();
      const diff = now.getTime() - date.getTime();
      return diff >= 0 && diff < 7 * 24 * 60 * 60 * 1000;
    }

    function isThisMonth(video) {
      const date = video.uploaded_at.toDate();
      const now = new Date();
      return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth();
    }

    function formatDateTime(timestamp) {
      const date = timestamp.toDate();
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hour = String(date.getHours()).padStart(2, '0');
      const minute = String(date.getMinutes()).padStart(2, '0');
      return `${year}-${month}-${day} ${hour}:${minute}`;
    }

    window.deleteVideoAction = async function(videoId) {
      if (!confirm('確定要刪除這支影片嗎？')) {
        return;
      }

      try {
        await deleteVideo(videoId);
        userVideos = userVideos.filter(v => v.id !== videoId);
        renderTimelineFilters(userVideos);
        renderStats(userVideos);
        renderVideoWall();
      } catch (error) {
        alert('刪除失敗: ' + error.message);
      }
    };
  </script>
</body>
</html>
