<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的配对 - 配对视频平台</title>
  <link rel="stylesheet" href="css/style-new.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- 顶部导航 -->
    <header class="header">
      <div class="header-content">
        <a href="dashboard.html" class="logo">配对视频</a>
        <div class="header-right">
          <span class="user-info" id="userEmail"></span>
          <button id="logoutBtn" class="btn btn-secondary btn-sm">登出</button>
        </div>
      </div>
    </header>

    <div style="display: flex; flex: 1;">
      <!-- 侧边栏 -->
      <nav class="sidebar">
        <ul class="nav-list">
          <li class="nav-item">
            <a href="dashboard.html" class="nav-link active">我的配对</a>
          </li>
          <li class="nav-item">
            <a href="upload.html" class="nav-link">上传视频</a>
          </li>
          <li class="nav-item">
            <a href="my-videos.html" class="nav-link">我的影片</a>
          </li>
        </ul>
      </nav>

      <!-- 主内容 -->
      <main class="main-content" style="flex: 1;">
        <div class="page-header">
          <div>
            <h1 class="page-title">我的配对</h1>
            <p class="page-desc">管理你的视频配对，与朋友分享短视频</p>
          </div>
          <button type="button" id="newPartnershipBtn" class="btn btn-primary">+ 创建新配对</button>
        </div>

        <!-- 消息提示 -->
        <div id="messageBox" class="message"></div>

        <!-- 统计信息 -->
        <div class="stats-grid" id="statsGrid" style="display: none;">
          <div class="stat-card">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">配对总数</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="activeCount">0</div>
            <div class="stat-label">活跃配对</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="videoPairCount">0</div>
            <div class="stat-label">视频对数</div>
          </div>
        </div>

        <!-- 配对列表 -->
        <div id="partnershipsList"></div>

        <!-- 空状态 -->
        <div id="emptyState" class="empty-state" style="display: none;">
          <div class="empty-icon">🤝</div>
          <h2 class="empty-title">还没有配对</h2>
          <p class="empty-desc">邀请朋友或者输入他们的邮箱，开始分享短视频吧</p>
          <button type="button" id="emptyNewBtn" class="btn btn-primary">创建配对</button>
        </div>
      </main>
    </div>
  </div>

  <!-- 创建配对模态框 -->
  <div id="partnershipModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>创建新配对</h2>
        <button type="button" class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="partnershipForm">
          <div class="form-group">
            <label class="form-label">朋友的邮箱</label>
            <input 
              type="email" 
              id="partnerEmail" 
              class="form-input" 
              placeholder="输入朋友的邮箱地址" 
              required
            >
          </div>
          <div id="formMessage" class="message"></div>
          <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
            <button type="submit" class="btn btn-primary">创建</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- 应用脚本 -->
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/partnership.js"></script>

  <script>
    let currentUser = null;
    let partnerships = [];

    const messageBox = document.getElementById('messageBox');
    const statsGrid = document.getElementById('statsGrid');
    const partnershipsList = document.getElementById('partnershipsList');
    const emptyState = document.getElementById('emptyState');
    const newPartnershipBtn = document.getElementById('newPartnershipBtn');
    const emptyNewBtn = document.getElementById('emptyNewBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const partnershipModal = document.getElementById('partnershipModal');
    const partnershipForm = document.getElementById('partnershipForm');

    // 初始化
    onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = user;
      document.getElementById('userEmail').textContent = user.email;
      await loadPartnerships();
    });

    // 退出登录
    logoutBtn.addEventListener('click', async () => {
      await logoutUser();
      window.location.href = 'index.html';
    });

    // 创建配对按钮
    newPartnershipBtn.addEventListener('click', () => {
      partnershipModal.classList.add('open');
      partnershipForm.reset();
      document.getElementById('formMessage').textContent = '';
    });

    emptyNewBtn.addEventListener('click', () => {
      partnershipModal.classList.add('open');
      partnershipForm.reset();
      document.getElementById('formMessage').textContent = '';
    });

    // 表单提交
    partnershipForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('partnerEmail').value.trim();
      const formMsg = document.getElementById('formMessage');
      
      try {
        formMsg.innerHTML = '';
        formMsg.className = 'message';
        
        if (email === currentUser.email) {
          throw new Error('不能与自己配对');
        }

        await createPartnership(currentUser.uid, currentUser.email, email);
        
        formMsg.className = 'message success';
        formMsg.textContent = '配对创建成功！';
        
        setTimeout(() => {
          closeModal();
          loadPartnerships();
        }, 1500);
      } catch (error) {
        formMsg.className = 'message error';
        formMsg.textContent = error.message || '创建失败，请重试';
      }
    });

    // 加载配对列表
    async function loadPartnerships() {
      try {
        messageBox.innerHTML = '';
        partnerships = await getUserPartnerships(currentUser.uid, currentUser.email);
        renderPartnerships();
      } catch (error) {
        messageBox.className = 'message error';
        messageBox.textContent = '加载配对失败: ' + error.message;
      }
    }

    // 渲染配对列表
    function renderPartnerships() {
      if (partnerships.length === 0) {
        statsGrid.style.display = 'none';
        partnershipsList.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      statsGrid.style.display = 'grid';
      emptyState.style.display = 'none';

      // 更新统计
      document.getElementById('totalCount').textContent = partnerships.length;
      document.getElementById('activeCount').textContent = partnerships.filter(p => p.status === 'active').length;

      partnershipsList.innerHTML = partnerships.map(partnership => {
        const partnerEmail = partnership.user_a_uid === currentUser.uid 
          ? partnership.user_b_email 
          : partnership.user_a_email;

        const createdAt = partnership.created_at.toDate();
        const dateStr = createdAt.toLocaleDateString('zh-CN');

        return `
          <div class="card" style="margin-bottom: 16px;">
            <div class="card-body">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <div>
                  <h3 style="margin: 0 0 4px; font-size: 16px; color: #333;">${partnerEmail}</h3>
                  <p style="margin: 0; font-size: 12px; color: #999;">配对于 ${dateStr}</p>
                </div>
                <span style="padding: 4px 12px; background: #e8f5e9; color: #2e7d32; border-radius: 20px; font-size: 12px; font-weight: 500;">
                  ${partnership.status === 'active' ? '活跃' : '已禁用'}
                </span>
              </div>
              <div style="display: flex; gap: 8px; margin-top: 12px;">
                <a href="watch-pair.html?partnershipId=${partnership.id}" class="btn btn-primary btn-sm" style="flex: 1;">观看配对</a>
                <button type="button" class="btn btn-danger btn-sm" style="flex: 1;" onclick="deletePartnership('${partnership.id}')">
                  删除
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    window.deletePartnership = async function(partnershipId) {
      if (!confirm('确定要删除这个配对吗？')) return;
      
      try {
        await db.collection('partnerships').doc(partnershipId).delete();
        messageBox.className = 'message success';
        messageBox.textContent = '配对已删除';
        loadPartnerships();
      } catch (error) {
        messageBox.className = 'message error';
        messageBox.textContent = '删除失败: ' + error.message;
      }
    };

    window.closeModal = function() {
      partnershipModal.classList.remove('open');
    };

    // 点击模态框背景关闭
    partnershipModal.addEventListener('click', (e) => {
      if (e.target === partnershipModal) {
        closeModal();
      }
    });
  </script>
</body>
</html>
