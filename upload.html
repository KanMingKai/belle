<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传视频 - 配对视频平台</title>
  <link rel="stylesheet" href="css/style-new.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- 顶部导航 -->
    <header class="header">
      <div class="header-content">
        <a href="dashboard.html" class="logo">配对视频</a>
        <div class="header-right">
          <span class="user-info" id="userEmail"></span>
          <button id="logoutBtn" class="btn btn-secondary btn-sm">登出</button>
        </div>
      </div>
    </header>

    <div style="display: flex; flex: 1;">
      <!-- 侧边栏 -->
      <nav class="sidebar">
        <ul class="nav-list">
          <li class="nav-item">
            <a href="dashboard.html" class="nav-link">我的配对</a>
          </li>
          <li class="nav-item">
            <a href="upload.html" class="nav-link active">上传视频</a>
          </li>
          <li class="nav-item">
            <a href="my-videos.html" class="nav-link">我的影片</a>
          </li>
        </ul>
      </nav>

      <!-- 主内容 -->
      <main class="main-content" style="flex: 1;">
        <div class="page-header">
          <div>
            <h1 class="page-title">上传视频</h1>
            <p class="page-desc">上传你的短视频，与朋友分享精彩时刻</p>
          </div>
        </div>

        <!-- 消息提示 -->
        <div id="messageBox" class="message"></div>

        <!-- 上传表单 -->
        <div class="card" style="max-width: 600px;">
          <div class="card-body">
            <form id="uploadForm">
              <!-- 视频选择 -->
              <div class="form-group">
                <label class="form-label">选择视频文件</label>
                <div style="
                  border: 2px dashed #0095ff;
                  border-radius: 8px;
                  padding: 40px 20px;
                  text-align: center;
                  cursor: pointer;
                  transition: all 0.2s ease;
                  background-color: #f8fbff;
                "
                  id="dropZone"
                  onmouseover="this.style.backgroundColor='#e3f2fd'"
                  onmouseout="this.style.backgroundColor='#f8fbff'"
                >
                  <div style="font-size: 48px; margin-bottom: 12px;">🎬</div>
                  <p style="margin: 0 0 8px; font-size: 16px; font-weight: 500; color: #333;">
                    拖拽视频到这里或点击选择
                  </p>
                  <p style="margin: 0; font-size: 12px; color: #999;">
                    支持 MP4, WebM, 最大 500MB
                  </p>
                  <input 
                    type="file" 
                    id="videoFile" 
                    accept="video/*" 
                    style="display: none;"
                    required
                  >
                </div>
                <p id="fileName" style="margin: 8px 0 0; font-size: 12px; color: #666;"></p>
              </div>

              <!-- 视频预览 -->
              <div id="previewContainer" style="display: none; margin-bottom: 24px;">
                <video 
                  id="videoPreview" 
                  style="width: 100%; border-radius: 8px; background: #000; max-height: 300px;"
                  controls
                ></video>
              </div>

              <!-- 配对选择 -->
              <div class="form-group">
                <label class="form-label">配对关系（可选）</label>
                <select id="partnershipSelect" class="form-select">
                  <option value="">-- 不选择配对 --</option>
                </select>
              </div>

              <!-- 描述 -->
              <div class="form-group">
                <label class="form-label">视频描述（可选）</label>
                <textarea 
                  id="description" 
                  class="form-textarea" 
                  placeholder="输入视频描述..."
                  rows="3"
                ></textarea>
              </div>

              <!-- 上传进度 -->
              <div id="progressContainer" style="display: none; margin-bottom: 24px;">
                <div style="margin-bottom: 8px;">
                  <span id="progressText" style="font-size: 12px; color: #666;">上传中...</span>
                </div>
                <div style="
                  width: 100%;
                  height: 6px;
                  background-color: #e0e0e0;
                  border-radius: 3px;
                  overflow: hidden;
                ">
                  <div 
                    id="progressBar" 
                    style="
                      height: 100%;
                      background-color: #0095ff;
                      width: 0%;
                      transition: width 0.2s ease;
                    "
                  ></div>
                </div>
              </div>

              <!-- 按钮 -->
              <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button type="reset" class="btn btn-secondary">清除</button>
                <button type="submit" class="btn btn-primary" id="submitBtn">上传</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- 应用脚本 -->
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/partnership.js"></script>
  <script src="js/cloudinary.js"></script>

  <script>
    let currentUser = null;
    let selectedFile = null;
    let partnerships = [];

    const messageBox = document.getElementById('messageBox');
    const dropZone = document.getElementById('dropZone');
    const videoFile = document.getElementById('videoFile');
    const fileName = document.getElementById('fileName');
    const previewContainer = document.getElementById('previewContainer');
    const videoPreview = document.getElementById('videoPreview');
    const uploadForm = document.getElementById('uploadForm');
    const submitBtn = document.getElementById('submitBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const partnershipSelect = document.getElementById('partnershipSelect');

    // 初始化
    onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = user;
      document.getElementById('userEmail').textContent = user.email;
      await loadPartnerships();
    });

    // 退出登录
    logoutBtn.addEventListener('click', async () => {
      await logoutUser();
      window.location.href = 'index.html';
    });

    // 拖拽上传
    dropZone.addEventListener('click', () => videoFile.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.style.backgroundColor = '#e3f2fd';
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.style.backgroundColor = '#f8fbff';
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.backgroundColor = '#f8fbff';
      
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleFileSelect(files[0]);
      }
    });

    // 文件选择
    videoFile.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFileSelect(e.target.files[0]);
      }
    });

    function handleFileSelect(file) {
      if (!file.type.startsWith('video/')) {
        messageBox.className = 'message error';
        messageBox.textContent = '请选择视频文件';
        return;
      }

      if (file.size > 500 * 1024 * 1024) {
        messageBox.className = 'message error';
        messageBox.textContent = '文件过大，最大支持 500MB';
        return;
      }

      selectedFile = file;
      fileName.textContent = `已选择: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)}MB)`;
      
      // 预览
      const url = URL.createObjectURL(file);
      videoPreview.src = url;
      previewContainer.style.display = 'block';
      
      messageBox.innerHTML = '';
      messageBox.className = 'message';
    }

    // 加载配对列表
    async function loadPartnerships() {
      try {
        partnerships = await getUserPartnerships(currentUser.uid, currentUser.email);
        
        partnershipSelect.innerHTML = '<option value="">-- 不选择配对 --</option>';
        partnerships.forEach(p => {
          const partnerEmail = p.user_a_uid === currentUser.uid 
            ? p.user_b_email 
            : p.user_a_email;
          const option = document.createElement('option');
          option.value = p.id;
          option.textContent = `与 ${partnerEmail} 的配对`;
          partnershipSelect.appendChild(option);
        });
      } catch (error) {
        console.error('加载配对失败:', error);
      }
    }

    // 表单提交
    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!selectedFile) {
        messageBox.className = 'message error';
        messageBox.textContent = '请选择视频文件';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '上传中...';
      document.getElementById('progressContainer').style.display = 'block';

      try {
        messageBox.innerHTML = '';

        // 上传到 Cloudinary
        const cloudinaryUrl = await uploadToCloudinary(selectedFile, (progress) => {
          document.getElementById('progressBar').style.width = progress + '%';
          document.getElementById('progressText').textContent = `上传中: ${Math.round(progress)}%`;
        });

        // 保存到 Firestore
        const videoData = {
          user_uid: currentUser.uid,
          cloudinary_url: cloudinaryUrl,
          uploaded_at: new Date(),
          description: document.getElementById('description').value || '',
          partnership_id: partnershipSelect.value || null
        };

        const docRef = await db.collection('videos').add(videoData);

        messageBox.className = 'message success';
        messageBox.textContent = '视频上传成功！';
        
        setTimeout(() => {
          uploadForm.reset();
          selectedFile = null;
          previewContainer.style.display = 'none';
          document.getElementById('progressContainer').style.display = 'none';
          fileName.textContent = '';
          window.location.href = 'my-videos.html';
        }, 1500);
      } catch (error) {
        messageBox.className = 'message error';
        messageBox.textContent = '上传失败: ' + error.message;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '上传';
      }
    });
  </script>
</body>
</html>
